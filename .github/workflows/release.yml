name: Release

on:
  push:
    branches: [main, master]

env:
  ARCHIVE_NAME: ${{ github.event.repository.name }}.mockz

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: mockzilla/actions
          path: .mockzilla-actions

      - name: Install mockzilla
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source .mockzilla-actions/shared/functions.sh
          install_mockzilla
          echo "/tmp" >> "$GITHUB_PATH"

      - name: Pack
        run: |
          mockzilla pack . \
            --name "${{ github.event.repository.name }}" \
            --output "${{ env.ARCHIVE_NAME }}"

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete latest --yes 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create latest "${{ env.ARCHIVE_NAME }}" \
            --title "Latest" \
            --notes "Packed from $(echo ${GITHUB_SHA} | cut -c1-7). Run with: mockzilla ${{ env.ARCHIVE_NAME }}" \
            --latest
